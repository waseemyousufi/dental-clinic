<template>
    <div class="dental-xray-view">
        <h2>Dental X-Ray Viewer</h2>
        <div class="image-container" :style="{ transform: `scale(${zoom})` }">
            <img :src="xrayImage" alt="Dental X-Ray" class="xray-image" @wheel="handleZoom" />
        </div>
        <div class="controls">
            <button @click="zoomIn">+</button>
            <button @click="zoomOut">-</button>
            <button @click="resetZoom">Reset</button>
            <label>
                <input type="checkbox" v-model="annotationsVisible" />
                Show Annotations
            </label>
        </div>
        <div v-if="annotationsVisible" class="annotations">
            <div v-for="annotation in annotations" :key="annotation.id" class="annotation"
                :style="{ left: annotation.x + 'px', top: annotation.y + 'px' }">
                {{ annotation.text }}
            </div>
        </div>
    </div>
</template>

<script>
    export default {
        name: 'DentalXrayView',
        data() {
            return {
                xrayImage: 'path/to/dental-xray-image.jpg', // Placeholder image path
                zoom: 1,
                annotationsVisible: false,
                annotations: [
                    { id: 1, x: 100, y: 200, text: 'Cavity detected' },
                    { id: 2, x: 300, y: 150, text: 'Healthy tooth' },
                ],
            };
        },
        methods: {
            zoomIn() {
                this.zoom = Math.min(this.zoom * 1.2, 3); // Max zoom 3x
            },
            zoomOut() {
                this.zoom = Math.max(this.zoom / 1.2, 0.5); // Min zoom 0.5x
            },
            resetZoom() {
                this.zoom = 1;
            },
            handleZoom(event) {
                event.preventDefault();
                if (event.deltaY < 0) {
                    this.zoomIn();
                } else {
                    this.zoomOut();
                }
            },
        },
    };
</script>
